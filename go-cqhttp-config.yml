# go-cqhttp 配置文件
# 首次运行go-cqhttp会自动生成此文件
# 这是经过优化的配置，可以直接使用

# ========================================================================
# 账号配置
# ========================================================================
account:
  uin: 0 # QQ账号（扫码登录留空即可）
  password: '' # 密码（扫码登录留空）
  encrypt: false
  status: 0 # 在线状态 0:在线 1:离开 2:隐身 3:忙碌
  relogin:
    delay: 3 # 重连延迟
    interval: 3 # 重连间隔
    max-times: 0 # 最大重连次数（0为无限）

# ========================================================================
# 心跳配置
# ========================================================================
heartbeat:
  interval: 5 # 心跳间隔（秒）

# ========================================================================
# 消息配置
# ========================================================================
message:
  post-format: string # 消息格式 string/array
  ignore-invalid-cqcode: false # 忽略无效CQ码
  force-fragment: false # 强制分片
  fix-url: false # 修复URL
  proxy-rewrite: '' # 消息代理重写
  report-self-message: false # 上报发送给自己的消息
  remove-reply-at: false # 移除reply时的at

# ========================================================================
# 输出配置
# ========================================================================
output:
  log-level: warn # 日志级别 trace/debug/info/warn/error/fatal/panic
  log-aging: 7 # 日志保留天数
  log-force-new: true # 每次启动重新创建日志文件
  log-colorful: true # 彩色日志
  debug: false # Debug模式

# ========================================================================
# 数据库配置
# ========================================================================
database:
  leveldb:
    enable: true # 是否启用leveldb

# ========================================================================
# API配置（重要）
# ========================================================================
servers:
  - http:
      host: 0.0.0.0 # 监听地址，0.0.0.0表示所有网卡
      port: 3000 # API端口（默认3000）
      token: '' # 访问令牌（建议设置）
      post: [] # 上报地址（如果需要事件上报）
      middlewares:
        - rate-limit:
            enabled: false # 是否启用限流
            frequency: 1 # 限流频率
            bucket: 1 # 令牌桶大小

# ========================================================================
# 上报配置（可选）
# ========================================================================
report:
  message:
    type: null # 上报类型
    dest_url: null # 上报地址

# ========================================================================
# 其他配置
# ========================================================================
default-ports: # 默认端口
  http: 3000
  ws: 3001
  pp: 3002

# ========================================================================
# 优化配置
# ========================================================================
# 性能优化
performance:
  cache-image: true # 缓存图片
  hash-cache-size: 1024 # 哈希缓存大小

# 安全配置
security:
  # 允许访问的路径
  allow-robots: false

# 更新检查
update:
  enabled: false # 是否检查更新
  source: github # 更新源
  interval: 86400 # 检查更新间隔（秒）

# ========================================================================
# 说明
# ========================================================================
# 1. 首次运行会生成device.json文件
# 2. 再次运行会显示二维码，用手机QQ扫码登录
# 3. 登录成功后会自动保存登录状态
# 4. API地址: http://localhost:3000
# 5. 详细文档: https://docs.go-cqhttp.org/
