<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bauhaus Clock | 包豪斯闹钟</title>
    <style>
        /* Bauhaus Philosophy: Form follows function. Minimalist, Geometric, Black/White/Gray. */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-gray: #e0e0e0;
            --medium-gray: #888888;
            --dark-gray: #333333;
            --border-radius-lg: 60px;
            --border-radius-md: 30px;
            --border-radius-sm: 15px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bauhaus-container {
            width: 90%;
            max-width: 450px;
            background: var(--bg-color);
            border: 2px solid var(--text-color);
            border-radius: var(--border-radius-lg);
            padding: 50px 40px;
            box-shadow: 20px 20px 0px var(--accent-gray);
            position: relative;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Geometric Background Elements */
        .bauhaus-container::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: var(--accent-gray);
            border-radius: 50%;
            z-index: -1;
        }

        /* Clock Display */
        .time-display {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 10px;
            line-height: 1;
        }

        .date-display {
            font-size: 1rem;
            color: var(--medium-gray);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 50px;
            font-weight: 500;
        }

        /* Controls Section */
        .alarm-interface {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-wrapper {
            position: relative;
            display: inline-block;
        }

        input[type="time"] {
            appearance: none;
            -webkit-appearance: none;
            background: var(--accent-gray);
            border: 2px solid transparent;
            padding: 15px 25px;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: var(--border-radius-md);
            outline: none;
            width: 100%;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        input[type="time"]:focus {
            border-color: var(--text-color);
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 18px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 2px solid var(--text-color);
            border-radius: var(--border-radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #set-btn {
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        #set-btn:hover {
            background-color: var(--dark-gray);
            transform: translateY(-2px);
        }

        #clear-btn {
            background-color: transparent;
            color: var(--text-color);
            display: none;
        }

        #clear-btn:hover {
            background-color: var(--accent-gray);
        }

        /* Status Indicator */
        .status-area {
            margin-top: 30px;
            height: 24px;
        }

        .status-pill {
            display: inline-block;
            padding: 4px 16px;
            background: var(--accent-gray);
            border-radius: var(--border-radius-sm);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--medium-gray);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .status-pill.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Ringing Animation */
        @keyframes bauhaus-shake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(-1deg) scale(1.02); }
            75% { transform: rotate(1deg) scale(1.02); }
        }

        .ringing {
            animation: bauhaus-shake 0.1s infinite;
            border-color: var(--text-color);
            background-color: #fcfcfc;
        }

        .ringing #stop-btn {
            display: block;
            background-color: var(--text-color);
            color: var(--bg-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        #stop-btn {
            display: none;
            width: 100%;
            margin-top: 15px;
        }

        /* Decorative Line */
        .decor-line {
            width: 40px;
            height: 6px;
            background: var(--text-color);
            margin: 40px auto 0;
            border-radius: 3px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .time-display { font-size: 3.5rem; }
            .bauhaus-container { padding: 40px 25px; }
        }
    </style>
</head>
<body>

    <main class="bauhaus-container" id="clock-container">
        <header>
            <div class="time-display" id="time-text">00:00</div>
            <div class="date-display" id="date-text">FEB 26 THU</div>
        </header>

        <section class="alarm-interface">
            <div class="input-wrapper">
                <input type="time" id="alarm-input" value="08:00">
            </div>
            
            <div class="button-group">
                <button id="set-btn">Set Alarm</button>
                <button id="clear-btn">Cancel</button>
            </div>

            <button id="stop-btn">Dismiss Alarm</button>
        </section>

        <footer class="status-area">
            <div id="status-pill" class="status-pill">Alarm Active</div>
        </footer>

        <div class="decor-line"></div>
    </main>

    <script>
        const timeText = document.getElementById('time-text');
        const dateText = document.getElementById('date-text');
        const alarmInput = document.getElementById('alarm-input');
        const setBtn = document.getElementById('set-btn');
        const clearBtn = document.getElementById('clear-btn');
        const stopBtn = document.getElementById('stop-btn');
        const statusPill = document.getElementById('status-pill');
        const container = document.getElementById('clock-container');

        let alarmTime = null;
        let isRinging = false;
        let audioContext = null;

        // Initialize Clock
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            
            timeText.textContent = `${h}:${m}`;
            
            // Minimal Date Format
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            dateText.textContent = `${months[now.getMonth()]} ${now.getDate()} ${days[now.getDay()]}`;

            // Check Alarm
            if (alarmTime === `${h}:${m}` && s === '00' && !isRinging) {
                triggerAlarm();
            }
        }

        // Alarm Logic
        function triggerAlarm() {
            isRinging = true;
            container.classList.add('ringing');
            stopBtn.style.display = 'block';
            setBtn.style.display = 'none';
            clearBtn.style.display = 'none';
            statusPill.textContent = "Time's Up";
            statusPill.classList.add('visible');
            
            playTone();
        }

        function playTone() {
            if (!isRinging) return;
            
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();

            osc.type = 'sine'; // Pure tone for Bauhaus feel
            osc.frequency.setValueAtTime(440, audioContext.currentTime);
            
            gain.gain.setValueAtTime(0.2, audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            osc.connect(gain);
            gain.connect(audioContext.destination);

            osc.start();
            osc.stop(audioContext.currentTime + 0.5);

            setTimeout(playTone, 800);
        }

        // UI Event Listeners
        setBtn.addEventListener('click', () => {
            alarmTime = alarmInput.value;
            statusPill.textContent = `Alarm: ${alarmTime}`;
            statusPill.classList.add('visible');
            setBtn.style.display = 'none';
            clearBtn.style.display = 'block';
            
            // Wake up AudioContext on user gesture
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        });

        clearBtn.addEventListener('click', () => {
            alarmTime = null;
            statusPill.classList.remove('visible');
            setBtn.style.display = 'block';
            clearBtn.style.display = 'none';
        });

        stopBtn.addEventListener('click', () => {
            isRinging = false;
            alarmTime = null;
            container.classList.remove('ringing');
            stopBtn.style.display = 'none';
            setBtn.style.display = 'block';
            clearBtn.style.display = 'none';
            statusPill.classList.remove('visible');
        });

        // Start Clock
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
