<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素闹钟 | PIXEL ALARM</title>
    <style>

        :root {
            --bg: #FFFFFF;
            --text: #000000;
            --gray: #808080;
            --light-gray: #C0C0C0;
            --dark-gray: #404040;
            --pixel: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            image-rendering: pixelated;
        }

        body {
            background-color: var(--light-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden;
        }


        .pixel-box {
            background: var(--bg);
            border: var(--pixel) solid var(--text);
            position: relative;
            padding: calc(var(--pixel) * 4);
            box-shadow: 
                var(--pixel) var(--pixel) 0 0 var(--dark-gray),
                calc(var(--pixel) * 2) calc(var(--pixel) * 2) 0 0 var(--gray);
        }

        .container {
            width: 320px;
            text-align: center;
        }

        h1 {
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 1rem;
            border-bottom: var(--pixel) solid var(--text);
            padding-bottom: 0.5rem;
            letter-spacing: 2px;
        }


        .display {
            background: #000;
            color: #FFF;
            padding: 1.5rem 1rem;
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            border: var(--pixel) solid var(--gray);
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
        }

        .display span {
            display: inline-block;
            min-width: 1ch;
        }

        .colon {
            animation: blink 1s steps(1) infinite;
        }

        @keyframes blink {
            50% { visibility: hidden; }
        }


        .controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        input[type="time"] {
            border: var(--pixel) solid var(--text);
            padding: 0.5rem;
            background: var(--bg);
            font-size: 1.1rem;
            outline: none;
            width: 140px;
            text-align: center;
        }

        button {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 0.5rem 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: var(--pixel) var(--pixel) 0 0 var(--gray);
            transition: transform 0.05s;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: calc(var(--pixel) / 2) calc(var(--pixel) / 2) 0 0 var(--gray);
        }

        .status {
            font-size: 0.8rem;
            color: var(--dark-gray);
            height: 1.2rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            font-weight: bold;
        }


        .ringing {
            animation: shake 0.15s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(2px, 2px); }
        }

        #stop-btn {
            background: #000;
            color: #fff;
            display: none;
            margin-top: 0.5rem;
            border: var(--pixel) solid #fff;
        }


        .pixel-decor {
            position: absolute;
            width: var(--pixel);
            height: var(--pixel);
            background: var(--text);
        }
        .tl { top: calc(var(--pixel) * -1); left: calc(var(--pixel) * -1); }
        .tr { top: calc(var(--pixel) * -1); right: calc(var(--pixel) * -1); }
        .bl { bottom: calc(var(--pixel) * -1); left: calc(var(--pixel) * -1); }
        .br { bottom: calc(var(--pixel) * -1); right: calc(var(--pixel) * -1); }

    </style>
</head>
<body>

    <div class="pixel-box container" id="clock-container">

        <div class="pixel-decor tl"></div>
        <div class="pixel-decor tr"></div>
        <div class="pixel-decor bl"></div>
        <div class="pixel-decor br"></div>

        <h1>Pixel Alarm</h1>
        
        <div class="display">
            <span id="h">00</span><span class="colon">:</span><span id="m">00</span><span class="colon">:</span><span id="s">00</span>
        </div>

        <div class="controls">
            <div class="input-group">
                <input type="time" id="alarm-time">
                <button id="set-btn">Set</button>
            </div>
            <div class="status" id="status">No Alarm</div>
            <button id="stop-btn">Stop Alarm</button>
        </div>
    </div>

    <script>
        const hEl = document.getElementById('h');
        const mEl = document.getElementById('m');
        const sEl = document.getElementById('s');
        const timeInput = document.getElementById('alarm-time');
        const setBtn = document.getElementById('set-btn');
        const statusEl = document.getElementById('status');
        const stopBtn = document.getElementById('stop-btn');
        const container = document.getElementById('clock-container');

        let alarm = null;
        let isRinging = false;
        let audioCtx = null;

        function update() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            hEl.textContent = h;
            mEl.textContent = m;
            sEl.textContent = s;


            if (alarm === `${h}:${m}` && s === '00' && !isRinging) {
                startRinging();
            }
        }

        function startRinging() {
            isRinging = true;
            container.classList.add('ringing');
            stopBtn.style.display = 'block';
            statusEl.textContent = "!!! WAKE UP !!!";
            
            // 简单的像素风格蜂鸣音 (Square Wave)

            
            const ring = () => {
                if (!isRinging) return;
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                
                gain.connect(audioCtx.destination);
                osc.connect(gain);
                
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
                
                setTimeout(ring, 200);
            };
            ring();
        }

        setBtn.addEventListener('click', () => {
            if (timeInput.value) {
                alarm = timeInput.value;
                statusEl.textContent = `Alarm at ${alarm}`;
                statusEl.style.color = 'black';
                

                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } else {
                statusEl.textContent = 'Set a time';
                statusEl.style.color = 'gray';
            }
        });

        stopBtn.addEventListener('click', () => {
            isRinging = false;
            container.classList.remove('ringing');
            stopBtn.style.display = 'none';
            statusEl.textContent = 'Alarm Cleared';
            alarm = null;
        });

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
